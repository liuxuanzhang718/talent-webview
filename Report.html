<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人天赋潜能报告 · 卡卡学姐</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="./report-role-cards.js"></script>
<style>
:root {
  --ink:       #0F0E0C;
  --ink-mid:   #3D3830;
  --ink-light: #7A7068;
  --gold:      #C8973A;
  --gold-l:    #E8C878;
  --gold-bg:   #FBF6EC;
  --gold-dim:  rgba(200,151,58,0.12);
  --surface:   #FAFAF7;
  --white:     #FFFFFF;
  --border:    #E8E4DC;
  --border-gold: rgba(200,151,58,0.25);
  --green:     #1A6B5A;
  --green-bg:  #EAF5F1;
  --red:       #B83A2E;
  --red-bg:    #FDF0EE;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--ink);
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  color: var(--white);
  max-width: 920px;
  margin: 0 auto;
}

body.pdf-exporting * {
  animation: none !important;
  transition: none !important;
}

body.pdf-exporting .fade-in,
body.pdf-exporting .delay-1,
body.pdf-exporting .delay-2,
body.pdf-exporting .delay-3,
body.pdf-exporting .delay-4 {
  opacity: 1 !important;
  transform: none !important;
}

/* ── fade-in animation ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeUp 0.6s ease both; }
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.22s; }
.delay-3 { animation-delay: 0.34s; }
.delay-4 { animation-delay: 0.46s; }

/* ══════════════════════════════════════
   COVER
══════════════════════════════════════ */
.cover {
  background: var(--ink);
  padding: 60px 56px 56px;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid rgba(200,151,58,0.2);
}
.cover::before {
  content: '';
  position: absolute;
  top: -120px; right: -120px;
  width: 480px; height: 480px;
  border-radius: 50%;
  border: 1px solid rgba(200,151,58,0.08);
  pointer-events: none;
}
.cover::after {
  content: '';
  position: absolute;
  bottom: -80px; left: -60px;
  width: 280px; height: 280px;
  border-radius: 50%;
  border: 1px solid rgba(200,151,58,0.05);
  pointer-events: none;
}
.cover-eyebrow {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(6px, 1.2vw, 8px);
  letter-spacing: 2.1px;
  color: var(--gold);
  margin-bottom: 18px;
  opacity: 0.9;
  white-space: nowrap;
  text-transform: uppercase;
}
.cover-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 34px; font-weight: 700;
  color: var(--white);
  letter-spacing: 3px;
  line-height: 1.2;
  margin-bottom: 8px;
}
.cover-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.42);
  letter-spacing: 2px;
  margin-bottom: 32px;
  font-family: 'JetBrains Mono', monospace;
}
/* Role card large hero */
.cover-card-wrap {
  display: grid;
  grid-template-columns: 216px minmax(0, 1fr);
  gap: 40px;
  align-items: center;
}
.cover-role-card {
  width: 216px;
  min-height: 236px;
  border-radius: 28px;
  border: 1px solid rgba(200,151,58,0.24);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 24px 54px rgba(0,0,0,0.24), 0 0 0 1px rgba(200,151,58,0.08);
}
.cover-role-card-top {
  width: 100%;
  min-height: 188px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.cover-role-card-top::after {
  content: none;
}
.cover-role-card-top svg {
  width: 154px;
  height: 154px;
  display: block;
}
.cover-role-meta {
  margin-bottom: 18px;
}
.cover-role-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.cover-role-en {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 3.2px;
  color: rgba(255,255,255,0.42);
  text-transform: uppercase;
}
.cover-dims {
  font-size: 12px;
  color: rgba(255,255,255,0.48);
  line-height: 1.85;
  margin-bottom: 20px;
}
.cover-dims b {
  color: var(--gold-l);
  font-weight: 600;
}
.cover-text { flex: 1; min-width: 0; }
.cover-tagline {
  font-family: 'Noto Serif SC', serif;
  max-width: 470px;
  font-size: 21px; font-weight: 600;
  color: var(--white);
  line-height: 1.72;
  margin-bottom: 18px;
  border-left: 3px solid var(--gold);
  padding-left: 20px;
}
.cover-rank-list {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.cover-rank-chip {
  min-width: 0;
  padding: 11px 12px 10px;
  border: 1px solid rgba(200,151,58,0.24);
  background: linear-gradient(180deg, rgba(255,255,255,0.045) 0%, rgba(255,255,255,0.02) 100%);
}
.cover-rank-label {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 4px;
}
.cover-rank-name {
  font-size: 11.5px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  margin-bottom: 8px;
  line-height: 1.45;
}
.cover-rank-index,
.cover-rank-score {
  font-family: 'JetBrains Mono', monospace;
  color: var(--gold-l);
}
.cover-rank-index {
  font-size: 9px;
  letter-spacing: 1px;
}
.cover-rank-score {
  font-size: 11px;
}
.cover-rank-bar {
  height: 3px;
  background: rgba(255,255,255,0.08);
}
.cover-rank-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-l));
}
.cover-chips {
  display: flex;
  flex-wrap: nowrap;
  gap: 8px;
  align-items: center;
}
.cover-chip {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 5px 12px;
  font-size: 9px;
  color: rgba(255,255,255,0.45);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.7px;
  white-space: nowrap;
}
.cover-chip.gold {
  background: rgba(200,151,58,0.1);
  border-color: rgba(200,151,58,0.3);
  color: var(--gold-l);
}

/* ══════════════════════════════════════
   SECTION SHARED
══════════════════════════════════════ */
.section {
  padding: 48px 56px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  background: var(--ink);
}
.section.light {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  color: var(--ink);
}
.section-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 5px;
  color: var(--gold);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.section-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px; font-weight: 700;
  color: var(--white);
  letter-spacing: 2px;
  margin-bottom: 6px;
}
.section.light .section-title { color: var(--ink); }
.section-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  margin-bottom: 30px;
  letter-spacing: 1px;
  font-family: 'JetBrains Mono', monospace;
}
.section.light .section-sub { color: var(--ink-light); }

/* ══════════════════════════════════════
   B · RADAR + BARS
══════════════════════════════════════ */
.radar-layout {
  display: flex;
  gap: 22px;
  align-items: flex-start;
}
.radar-svg-wrap {
  flex-shrink: 0;
  width: min(340px, 100%);
  padding: 0;
  border: none;
  background: none;
  overflow: visible;
  align-self: flex-start;
}
.bars-wrap {
  flex: 1;
  padding: 22px 24px 14px;
  border-radius: 18px;
  border: 1px solid rgba(200,151,58,0.14);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.015) 100%);
}
.bar-row {
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.045);
}
.bar-row:last-child {
  margin-bottom: 0;
  padding-bottom: 0;
  border-bottom: none;
}
.bar-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}
.bar-name {
  font-size: 13.5px;
  font-weight: 700;
  color: var(--white);
  display: flex;
  align-items: center;
  gap: 8px;
}
.bar-name .star-badge {
  font-size: 9px;
  color: var(--gold);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px;
  border: 1px solid rgba(200,151,58,0.4);
  padding: 1px 6px;
}
.bar-score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: rgba(255,255,255,0.48);
}
.bar-track {
  height: 5px;
  background: rgba(255,255,255,0.07);
  position: relative;
  border-radius: 999px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, rgba(200,151,58,0.5), var(--gold));
  position: relative;
  border-radius: 999px;
}
.bar-fill.top {
  background: linear-gradient(90deg, var(--gold), var(--gold-l));
}
.section.light .bar-name { color: var(--ink); }
.section.light .bar-track { background: var(--border); }

/* ══════════════════════════════════════
   C · PROFILE
══════════════════════════════════════ */
.profile-box {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(200,151,58,0.2);
  padding: 32px 36px;
  position: relative;
}
.profile-box::before {
  content: '"';
  position: absolute;
  top: 20px; left: 28px;
  font-family: 'Noto Serif SC', serif;
  font-size: 72px;
  color: rgba(200,151,58,0.1);
  line-height: 1;
  pointer-events: none;
}
.profile-text {
  font-family: 'Noto Serif SC', serif;
  font-size: 15px;
  color: rgba(255,255,255,0.85);
  line-height: 2.1;
  position: relative;
  z-index: 1;
}
.profile-text strong { color: var(--gold-l); font-weight: 600; }

/* ══════════════════════════════════════
   DIVIDER
══════════════════════════════════════ */
.flow-divider {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 56px;
  background: var(--ink);
}
.flow-divider-line { flex: 1; height: 1px; background: rgba(200,151,58,0.15); }
.flow-divider-text {
  padding: 18px 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 4px;
  color: var(--gold);
  opacity: 0.7;
  white-space: nowrap;
}

/* ══════════════════════════════════════
   D · STRENGTH BLOCKS
══════════════════════════════════════ */
.strength-item {
  padding: 36px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.strength-item:last-child { border-bottom: none; padding-bottom: 0; }
.strength-header {
  display: grid;
  grid-template-columns: 58px minmax(0, 1fr);
  gap: 20px;
  margin-bottom: 16px;
  align-items: flex-start;
}
.strength-num {
  flex-shrink: 0;
  width: 58px; height: 58px;
  border: 1px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px; font-weight: 700;
  color: var(--gold);
}
.strength-name-wrap { flex: 1; padding-top: 4px; }
.strength-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px; font-weight: 700;
  color: var(--white);
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.strength-desc {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  line-height: 1.9;
}
.kw-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; margin-left: 78px; }
.kw-chip {
  background: var(--gold-dim);
  border: 1px solid var(--border-gold);
  color: var(--gold-l);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 1px;
  padding: 4px 14px;
}
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; margin-left: 78px; }
.col-box {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 20px 22px;
}
.col-box-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 3px;
  color: var(--gold);
  margin-bottom: 12px;
  text-transform: uppercase;
}
.col-box ul { list-style: none; }
.col-box ul li {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  line-height: 1.85;
  padding-left: 14px;
  position: relative;
  margin-bottom: 3px;
}
.col-box ul li::before {
  content: '·';
  position: absolute; left: 0;
  color: var(--gold);
  font-size: 14px; line-height: 1.7;
}

/* ══════════════════════════════════════
   F · CALIBRATION
══════════════════════════════════════ */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 1px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.06);
}
.cal-cell {
  background: var(--ink);
  padding: 28px 24px;
}
.cal-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 3px;
  color: var(--gold);
  margin-bottom: 14px;
  text-transform: uppercase;
}
.cal-pct {
  font-family: 'Noto Serif SC', serif;
  font-size: 44px; font-weight: 700;
  color: var(--white);
  line-height: 1;
  margin-bottom: 12px;
}
.cal-pct .unit { font-size: 18px; color: var(--gold); }
.cal-bar-track { height: 3px; background: rgba(255,255,255,0.08); margin-bottom: 16px; }
.cal-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-l)); }
.cal-desc {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  line-height: 1.8;
}

/* ══════════════════════════════════════
   G · CURRENT ACTIVATION
══════════════════════════════════════ */
.invest-task-box {
  background: rgba(200,151,58,0.06);
  border: 1px solid rgba(200,151,58,0.2);
  padding: 18px 24px;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.invest-task-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 3px;
  color: var(--gold);
  margin-bottom: 5px;
}
.invest-task-value {
  font-size: 13px; font-weight: 700;
  color: var(--white);
  line-height: 1.6;
}
.invest-icon { font-size: 28px; flex-shrink: 0; }

.g-bars { }
.g-bar-row { margin-bottom: 18px; }
.g-bar-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 7px;
}
.g-bar-name { font-size: 13px; color: rgba(255,255,255,0.8); font-weight: 500; }
.g-bar-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 1px;
  padding: 2px 8px;
  border: 1px solid;
}
.g-bar-status.hot { color: var(--gold-l); border-color: rgba(200,151,58,0.4); background: rgba(200,151,58,0.08); }
.g-bar-status.mid { color: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.1); }
.g-bar-status.low { color: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.07); }
.g-bar-track { height: 3px; background: rgba(255,255,255,0.07); }
.g-bar-fill { height: 100%; background: linear-gradient(90deg, rgba(200,151,58,0.5), var(--gold)); }
.g-bar-fill.dim { background: rgba(255,255,255,0.15); }
.g-bar-fill.low { background: rgba(255,255,255,0.08); }

.gap-insight {
  margin-top: 28px;
  border: 1px solid rgba(200,151,58,0.25);
  border-left: 3px solid var(--gold);
  padding: 16px 20px;
  background: rgba(200,151,58,0.04);
}
.gap-insight-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 3px;
  color: var(--gold); margin-bottom: 7px;
}
.gap-insight-text {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  line-height: 1.85;
}

/* ══════════════════════════════════════
   E · POWER / BLIND
══════════════════════════════════════ */
.power-blind-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: rgba(255,255,255,0.06);
}
.pb-col { background: var(--ink); padding: 28px 28px; }
.pb-heading {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 4px;
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 10px;
}
.pb-heading.power { color: #2A9478; }
.pb-heading.blind { color: #C0392B; }
.pb-list { list-style: none; }
.pb-list li {
  font-size: 13px;
  color: rgba(255,255,255,0.65);
  line-height: 1.85;
  padding: 10px 14px 10px 28px;
  position: relative;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.pb-list li:last-child { border-bottom: none; }
.pb-list.power li::before {
  content: '✓';
  position: absolute; left: 8px; top: 11px;
  color: #2A9478; font-size: 11px; font-weight: 700;
}
.pb-list.blind li::before {
  content: '△';
  position: absolute; left: 8px; top: 11px;
  color: #C0392B; font-size: 10px;
}

/* ══════════════════════════════════════
   H · ACTION
══════════════════════════════════════ */
.action-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: rgba(255,255,255,0.06);
}
.action-block { background: var(--ink); padding: 26px 26px; }
.action-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 3px;
  color: var(--gold);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.action-list { list-style: none; }
.action-list li {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  line-height: 1.85;
  padding-left: 16px;
  position: relative;
  margin-bottom: 6px;
}
.action-list li::before {
  content: '→';
  position: absolute; left: 0;
  color: rgba(200,151,58,0.5);
  font-size: 11px;
}

/* ══════════════════════════════════════
   NARRATIVE ARC FOOTER
══════════════════════════════════════ */
.quick-nav {
  padding: 26px 56px 30px;
  background: var(--ink);
  border-top: 1px solid rgba(200,151,58,0.15);
}
.quick-nav-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}
.quick-nav-link {
  appearance: none;
  text-decoration: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.6px;
  color: rgba(255,255,255,0.5);
  min-height: 44px;
  white-space: nowrap;
  padding: 0 14px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.02);
  transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
}
.quick-nav-link.active,
.quick-nav-link:hover {
  color: var(--gold-l);
  border-color: rgba(200,151,58,0.3);
  background: rgba(200,151,58,0.06);
}
.quick-nav-link:active {
  transform: translateY(1px);
}

/* ══════════════════════════════════════
   FOOTER
══════════════════════════════════════ */
.report-footer {
  padding: 24px 56px;
  background: var(--ink);
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-brand {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 3px;

function getURLParameter(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function escapeHtml(value) {
  return String(value == null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function normalizeTop3(top3 = [], scoreMap = {}) {
  if (!Array.isArray(top3)) return [];
  return top3
    .map((item) => {
      if (typeof item === 'string') {
        return {
          name: item,
          score: Number(scoreMap[item] || 0)
        };
      }
      if (item && item.name) {
        return {
          name: item.name,
          score: Number(item.score != null ? item.score : scoreMap[item.name] || 0)
        };
      }
      return null;
    })
    .filter(Boolean)
    .sort((a, b) => b.score - a.score)
    .map((item) => item.name);
}

function normalizePart1Scores(rawScores = {}) {
  if (!rawScores || typeof rawScores !== 'object') return {};
  return Object.entries(CALIBRATION_META).reduce((acc, [canonicalName, meta]) => {
    const matchedKey = (meta.aliases || [canonicalName]).find((alias) => rawScores[alias] != null);
    acc[canonicalName] = matchedKey ? rawScores[matchedKey] : 0;
    return acc;
  }, {});
}

function normalizeRoleData(raw = {}) {

  const normalizedSuggestions = {};
  let fallbackSuggestions = [];

    fallbackSuggestions = rawSuggestions.filter(Boolean);

    ACTION_META.forEach((meta) => {
      if (Array.isArray(rawSuggestions[meta.key])) {
        normalizedSuggestions[meta.key] = rawSuggestions[meta.key].filter(Boolean);
      }
    });
    const generalKeys = ['general', 'default', 'summary', 'all'];
    const fallbackKey = generalKeys.find((key) => Array.isArray(rawSuggestions[key]));
    if (fallbackKey) {
      fallbackSuggestions = rawSuggestions[fallbackKey].filter(Boolean);
    }
  }

  return {
    name: raw.name || '',
    description: raw.description || '',
    characteristics: Array.isArray(raw.characteristics) ? raw.characteristics : [],
    blindSpots: Array.isArray(raw.blindSpots) ? raw.blindSpots : [],
    suggestions: normalizedSuggestions,
    fallbackSuggestions
  };
}

function normalizeReportPayload(parsed) {
  if (!parsed || typeof parsed !== 'object') return null;
  const rawRole = normalizeRoleData(parsed.roleData || parsed.role_data || {});
  const rawUser = parsed.userInfo || parsed.user_info || {};
  const part2Scores = parsed.part2Scores || parsed.part2_scores || {};
  const normalizedTop3 = normalizeTop3(parsed.top3, part2Scores);
  const computedTop3 = normalizedTop3.length
    ? normalizedTop3
    : Object.keys(part2Scores)
        .sort((a, b) => Number(part2Scores[b] || 0) - Number(part2Scores[a] || 0))
        .slice(0, 3);

  return {
    reportId: parsed.reportId || parsed.report_id || '',
    completedAt: parsed.completedAt || parsed.completed_at || '',
    part1Scores: normalizePart1Scores(parsed.part1Scores || parsed.part1_scores || {}),
    part2Scores,
    top3: computedTop3,
    roleData: {
      ...rawRole,
      name: rawRole.name || parsed.talentType || parsed.talent_type || ''
    },
    roleKey: parsed.roleKey || parsed.role_key || '',
    matchType: parsed.matchType || parsed.match_type || '',
    userInfo: {
      nickname: rawUser.nickname || '',
      age: rawUser.age || '',
      gender: rawUser.gender || '',
      status: Array.isArray(rawUser.status) ? rawUser.status : [],
      focus: rawUser.focus || '',
      statusDetails: rawUser.statusDetails || {},
      statusDetailList: Array.isArray(rawUser.statusDetailList) ? rawUser.statusDetailList : []
    }
  };
}

function parseReportDataFromURL() {
  const raw = getURLParameter('reportData');
  if (!raw) return null;
  try {
    return normalizeReportPayload(JSON.parse(raw));
  } catch (error) {
    console.warn('[Report] parse reportData failed:', error);
    return null;
  }
}

async function resolveReportData() {
  const reportUrl = getURLParameter('reportUrl');
  if (reportUrl) {
    try {
      const response = await fetch(reportUrl, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`request failed: ${response.status}`);
      }
      const parsed = await response.json();
      const normalized = normalizeReportPayload(parsed);
      if (normalized) return normalized;
    } catch (error) {
      console.warn('[Report] fetch reportUrl failed:', error);
    }
  }
  return parseReportDataFromURL();
}

function formatDisplayDate(raw) {
  const date = raw ? new Date(raw) : new Date();
  if (Number.isNaN(date.getTime())) return '';
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}.${month}.${day}`;
}

function toPercentScore(value) {
  const numeric = Number(value || 0);
  return Math.max(0, Math.min(100, numeric));
}

function toFiveScore(value) {
  const numeric = Number(value || 0);
  return Math.max(0, Math.min(5, numeric));
}

function getOrderedDimensionItems(scoreMap = {}, top3 = []) {
  return DIMENSION_ORDER.map((name) => ({
    name,
    value: toFiveScore(scoreMap[name]),
    percent: Math.round((toFiveScore(scoreMap[name]) / 5) * 100),
    isTop: top3.includes(name),
    topIndex: top3.indexOf(name),
    originIndex: DIMENSION_ORDER.indexOf(name)
  })).sort((a, b) => {
    if (b.value !== a.value) return b.value - a.value;
    if (Number(b.isTop) !== Number(a.isTop)) return Number(b.isTop) - Number(a.isTop);
    if (a.isTop && b.isTop && a.topIndex !== b.topIndex) return a.topIndex - b.topIndex;
    return a.originIndex - b.originIndex;
  });
}

function stripHtmlTags(value = '') {
  return String(value).replace(/<[^>]+>/g, '');
}

function extractDimensionNames(items = []) {
  if (!Array.isArray(items)) return [];
  return items
    .map((item) => {
      if (typeof item === 'string') return item.trim();
      if (item && typeof item === 'object' && typeof item.name === 'string') {
        return item.name.trim();
      }
      return '';
    })
    .filter(Boolean);
}

function buildDimensionComboKey(items = []) {
  return items
    .filter((item) => DIMENSION_ORDER.includes(item))
    .sort((a, b) => DIMENSION_ORDER.indexOf(a) - DIMENSION_ORDER.indexOf(b))
    .join('|');
}

function getRoleCardIndex() {
  if (window.__REPORT_ROLE_CARD_INDEX) {
    return window.__REPORT_ROLE_CARD_INDEX;
  }
  const index = {
    byName: {},
    byCombo: {}
  };
  Object.values(ROLE_CARD_LIBRARY).forEach((card) => {
    if (!card || !card.name) return;
    index.byName[card.name] = card;
    const combo = buildDimensionComboKey(
      stripHtmlTags(card.dimsHtml)
        .split('×')
        .map((item) => item.trim())
    );
    if (combo) {
      index.byCombo[combo] = card;
    }
  });
  window.__REPORT_ROLE_CARD_INDEX = index;
  return index;
}

function getRoleCardData(roleName, data = null) {
  const index = getRoleCardIndex();
  if (roleName && index.byName[roleName]) {
    return index.byName[roleName];
  }
  const roleKeyCombo = buildDimensionComboKey(
    stripHtmlTags((data && (data.roleKey || (data.roleData && data.roleData.role_key))) || '')
      .split('×')
      .map((item) => item.trim())
  );
  if (roleKeyCombo && index.byCombo[roleKeyCombo]) {
    return index.byCombo[roleKeyCombo];
  }
  const top3Combo = buildDimensionComboKey(extractDimensionNames(data && data.top3));
  if (top3Combo && index.byCombo[top3Combo]) {
    return index.byCombo[top3Combo];
  }
  return null;
}

function buildRoleTagline(data) {
  const roleCard = getRoleCardData(data.roleData.name || '', data);
  if (roleCard && roleCard.tagline) {
    return roleCard.tagline;
  }
  const roleDescription = data.roleData.description || '';
  if (roleDescription) {
    const sentence = roleDescription.split('。').find(Boolean) || roleDescription;
    const parts = sentence.replace(/，/g, '，<br>').split('<br>');
    return parts.slice(0, 3).join('<br>');
  }
  if (data.top3.length) {
    return `${escapeHtml(data.top3[0])} × ${escapeHtml(data.top3[1] || '')}<br>与 ${escapeHtml(data.top3[2] || '')} 共同形成<br>你的专属优势结构`;
  }
  return '你的独特优势组合<br>正在被重新看见<br>并逐步点亮。';
}

function buildCoverLead(data) {
  const roleDescription = (data.roleData && data.roleData.description) || '';
  if (roleDescription) {
    const sentence = roleDescription
      .split('。')
      .map((item) => item.trim())
      .filter(Boolean)[0] || '';
    if (sentence) {
      const parts = sentence.replace(/，/g, '，<br>').split('<br>');
      return parts.slice(0, 3).join('<br>');
    }
  }
  return buildRoleTagline(data);
}

function buildRadarSvg(data) {
  const centerX = 200;
  const centerY = 156;
  const positions = {
    '创意表达力': [200, 88],
    '沟通影响力': [276, 122],
    '技术适应力': [276, 210],
    '结构思维力': [200, 248],
    '协作引领力': [124, 210],

  };
  const labelLayouts = {

    '沟通影响力': { cx: 330, cy: 118, width: 116, height: 46 },
    '技术适应力': { cx: 330, cy: 214, width: 108, height: 44 },
    '结构思维力': { cx: 200, cy: 298, width: 136, height: 48 },
    '协作引领力': { cx: 70, cy: 214, width: 116, height: 46 },
    '目标执行力': { cx: 70, cy: 118, width: 108, height: 44 }
  };
  const scoreItems = getOrderedDimensionItems(data.part2Scores, data.top3);
  const scoreLookup = scoreItems.reduce((acc, item) => {
    acc[item.name] = item;
    return acc;
  }, {});
  const polygonPoints = DIMENSION_ORDER.map((name) => {
    const [x, y] = positions[name];
    const score = (scoreLookup[name] && scoreLookup[name].percent) || 0;
    const rate = score / 100;
    return `${centerX + (x - centerX) * rate},${centerY + (y - centerY) * rate}`;
  }).join(' ');
  const rings = [1, 0.8, 0.6, 0.4, 0.2].map((ratio, index) => {
    const points = DIMENSION_ORDER.map((name) => {
      const [x, y] = positions[name];
      return `${centerX + (x - centerX) * ratio},${centerY + (y - centerY) * ratio}`;
    }).join(' ');
    return `<polygon points="${points}" fill="${index % 2 === 0 ? 'rgba(255,255,255,0.015)' : 'rgba(200,151,58,0.02)'}" stroke="rgba(200,151,58,0.14)" stroke-width="0.9" />`;
  }).join('');
  const axisLines = DIMENSION_ORDER.map((name) => {
    const [x, y] = positions[name];
    return `<line x1="${centerX}" y1="${centerY}" x2="${x}" y2="${y}" stroke="rgba(200,151,58,0.16)" stroke-width="0.9" />`;
  }).join('');
  const labels = DIMENSION_ORDER.map((name) => {
    const item = scoreLookup[name] || {};
    const layout = labelLayouts[name];
    const width = layout.width;
    const height = layout.height;
    const rectX = layout.cx - width / 2;
    const rectY = layout.cy - height / 2;
    const bg = item.isTop ? 'rgba(232,200,120,0.13)' : 'rgba(255,255,255,0.04)';
    const stroke = item.isTop ? 'rgba(232,200,120,0.45)' : 'rgba(255,255,255,0.08)';
    const secondary = item.isTop ? `TOP ${item.topIndex + 1} · ${item.value ? item.value.toFixed(1) : '0.0'}` : `${item.value ? item.value.toFixed(1) : '0.0'} / 5`;
    return `
      <g>
        <rect x="${rectX}" y="${rectY}" width="${width}" height="${height}" rx="${height / 2}" fill="${bg}" stroke="${stroke}" />
        <text x="${layout.cx}" y="${rectY + 20}" font-size="11.5" font-weight="600" fill="${item.isTop ? '#F4DEA4' : 'rgba(255,255,255,0.86)'}" text-anchor="middle" font-family="PingFang SC, sans-serif">${escapeHtml(name)}</text>
        <text x="${layout.cx}" y="${rectY + 36}" font-size="9.4" fill="${item.isTop ? '#C8973A' : 'rgba(255,255,255,0.48)'}" text-anchor="middle" font-family="JetBrains Mono, monospace">${escapeHtml(secondary)}</text>
      </g>
    `;
  }).join('');
  const nodes = DIMENSION_ORDER.map((name) => {
    const item = scoreLookup[name] || {};
    const [x, y] = positions[name];
    const px = centerX + (x - centerX) * (item.percent || 0) / 100;
    const py = centerY + (y - centerY) * (item.percent || 0) / 100;
    return `
      <g>
        <circle cx="${px}" cy="${py}" r="${item.isTop ? 6 : 4.6}" fill="${item.isTop ? '#F4DEA4' : '#C8973A'}" stroke="#0F0E0C" stroke-width="1.4" />
      </g>
    `;
  }).join('');

  return `
    <svg viewBox="0 0 400 324" width="400" height="324" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="width:100%;height:auto;">
      <defs>
        <linearGradient id="radarFillGradient" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="rgba(232,200,120,0.30)" />
          <stop offset="100%" stop-color="rgba(200,151,58,0.08)" />
        </linearGradient>
      </defs>
      ${rings}
      ${axisLines}
      <polygon points="${polygonPoints}" fill="url(#radarFillGradient)" stroke="#E8C878" stroke-width="2" />
      <circle cx="${centerX}" cy="${centerY}" r="18" fill="#0F0E0C" stroke="rgba(232,200,120,0.28)" stroke-width="1.2" />

      ${nodes}
      ${labels}
    </svg>
  `;
}

function dedupeTextList(items = []) {
  const seen = new Set();
  return items.filter((item) => {
    const normalized = String(item || '').trim();
    if (!normalized || seen.has(normalized)) return false;
    seen.add(normalized);
    return true;
  });
}

function buildFallbackActionBlocks(data) {
  const top3 = data.top3.slice(0, 3);
  const ordered = getOrderedDimensionItems(data.part2Scores, data.top3);
  const lowNames = ordered.slice(-2).map((item) => item.name).join('、');
  const focus = data.userInfo.focus || '你当前最投入的事情';
  const topDetails = top3.map((name) => talentDetails[name] || {}).filter(Boolean);

  const blocks = [
    {
      key: 'work',
      icon: '🎓',
      en: 'WORK & STUDY',
      items: [
        `把「${focus}」拆成一个 2 周内可以复盘的小目标，优先安排能发挥 ${top3[0] || '当前优势'} 与 ${top3[1] || top3[0] || '第二优势'} 的任务。`,
        ...topDetails.flatMap((detail) => Array.isArray(detail.learning) ? detail.learning.slice(0, 1) : []),
        `如果当前学习或工作长期压住 ${lowNames || '其余维度'}，说明环境匹配度可能还不够，需要主动调整任务结构。`
      ]
    },
    {
      key: 'life',
      icon: '🏠',
      en: 'DAILY LIFE',
      items: [
        `每周给自己留出 1 到 2 段不被绩效追赶的时间，让 ${top3[0] || '优势'} 有自然发挥的空间。`,
        ...topDetails.flatMap((detail) => Array.isArray(detail.growth) ? detail.growth.slice(0, 1) : []),
        `记录哪些日常安排最容易让你进入心流，这会比单纯“更努力”更能提升你的状态。`
      ]
    },
    {
      key: 'social',
      icon: '🤝',
      en: 'SOCIAL & NETWORK',
      items: [
        `在合作里主动承担最能体现 ${top3[1] || top3[0] || '你当前优势'} 的角色，而不是平均分配所有任务。`,
        `找 1 位熟悉你的人，具体问一句：你最常在哪些场景里感受到我的 ${top3[0] || '优势'}？`,
        `把擅长的部分说清楚、做稳定，别人更容易看见你真实的价值。`
      ]
    },
    {
      key: 'longterm',
      icon: '🌱',
      en: 'LONG-TERM GROWTH',
      items: [
        `未来判断一个机会值不值得投入时，把“它能否持续激活 ${top3.join('、') || '你的核心优势'}”作为筛选条件之一。`,
        `低分维度 ${lowNames || '其余维度'} 不一定是短板，但需要通过训练或环境补位，避免长期失衡。`,
        `每隔 4 到 6 周复盘一次：现在做的事是在放大优势，还是只是在消耗你。`
      ]
    }
  ];

  return blocks.map((block) => ({
    ...block,
    items: dedupeTextList(block.items).slice(0, 3)
  }));
}

function renderActionSection(data) {
  const fallbackBlocks = buildFallbackActionBlocks(data);
  const blocks = ACTION_META
    .map((meta) => ({
      ...meta,
      items: Array.isArray(data.roleData.suggestions && data.roleData.suggestions[meta.key]) ? data.roleData.suggestions[meta.key] : []
    }))
    .map((item) => {
      if (item.items.length > 0) return item;
      const fallback = fallbackBlocks.find((block) => block.key === item.key);
      return fallback ? { ...item, items: fallback.items } : item;
    })
    .filter((item) => item.items.length > 0);

  const fallbackSuggestions = Array.isArray(data.roleData.fallbackSuggestions)
    ? data.roleData.fallbackSuggestions
    : [];

  if (!blocks.length && !fallbackSuggestions.length) {
    return `
      <div class="section" id="section-h">
        <div class="section-eyebrow">H · ACTION GUIDE</div>
        <div class="section-title">行动建议</div>
        <div class="section-sub">工作学业 / 日常生活 / 社交人际 / 长期发展</div>
      <div class="action-grid">
          ${fallbackBlocks.map((block, index) => {
            const isWide = fallbackBlocks.length % 2 === 1 && index === fallbackBlocks.length - 1;
            return `
              <div class="action-block"${isWide ? ' style="grid-column:1 / -1;"' : ''}>
                <div class="action-tag">${block.icon} ${escapeHtml(block.en)}</div>
                <ul class="action-list">${block.items.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}</ul>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  const html = blocks.length
    ? blocks.map((block, index) => {
    const isWide = blocks.length % 2 === 1 && index === blocks.length - 1;
    return `
      <div class="action-block"${isWide ? ' style="grid-column:1 / -1;"' : ''}>
        <div class="action-tag">${block.icon} ${escapeHtml(block.en)}</div>
        <ul class="action-list">${block.items.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}</ul>
      </div>
    `;
  }).join('')
    : `
      <div class="action-block" style="grid-column:1 / -1;">
        <div class="action-tag">✦ ACTION GUIDE</div>
        <ul class="action-list">${fallbackSuggestions.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}</ul>
      </div>
    `;

  return `
    <div class="section" id="section-h">
      <div class="section-eyebrow">H · ACTION GUIDE</div>
      <div class="section-title">行动建议</div>
      <div class="section-sub">工作学业 / 日常生活 / 社交人际 / 长期发展</div>
      <div class="action-grid">${html}</div>
    </div>
  `;
}

function renderError(message) {
  const mount = document.getElementById('reportMount');
  const nav = document.getElementById('reportNavigation');
  mount.innerHTML = `
    <div class="report-error">
      <div class="report-error-card">
        <div class="loading-eyebrow">REPORT UNAVAILABLE</div>
        <div class="report-error-title">报告暂时无法打开</div>
        <div class="report-error-desc">${escapeHtml(message || '请返回小程序后重试，或重新进入报告页。')}</div>
      </div>
    </div>
  `;
  nav.style.display = 'flex';
  document.getElementById('downloadButton').style.display = 'none';
}

async function renderReportPage() {
  const backButton = document.getElementById('backButton');
  backButton.textContent = isMiniProgram ? '返回小程序' : '返回上一页';

  const data = await resolveReportData();
  if (!data || !data.roleData || !data.roleData.name) {
    renderError('请返回小程序后重试。如果问题持续，请重新进入完整报告。');
    document.getElementById('reportLoadingScreen').classList.add('hidden');
    return;
  }

  window.reportData = data;
  document.title = `个人天赋潜能报告 · ${data.userInfo.nickname || data.roleData.name}`;
  document.getElementById('reportMount').innerHTML = generateReportMarkup(data);
  document.getElementById('reportNavigation').style.display = 'flex';
  document.getElementById('reportLoadingScreen').classList.add('hidden');
}

function backToMiniProgram() {
  if (isMiniProgram) {
    try {
      wx.miniProgram.navigateBack();
      return;
    } catch (error) {
      console.warn('[Report] navigateBack failed:', error);
    }
  }
  if (window.history.length > 1) {
    window.history.back();
  }
}

async function createPdfDocument() {
  const element = document.getElementById('reportMount');
  document.body.classList.add('pdf-exporting');
  await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
  await document.fonts.ready;
  try {
    const canvas = await html2canvas(element, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#0F0E0C',
      logging: false,
      scrollX: 0,
      scrollY: -window.scrollY,
      width: element.scrollWidth,
      height: element.scrollHeight,
      windowWidth: element.scrollWidth,
      windowHeight: element.scrollHeight
    });

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pageWidth = 210;
    const pageHeight = 297;
    const sliceHeightPx = Math.floor(canvas.width * (pageHeight / pageWidth));
    const pageCanvas = document.createElement('canvas');
    const pageContext = pageCanvas.getContext('2d');
    pageCanvas.width = canvas.width;

    let renderedHeight = 0;
    let pageIndex = 0;

    while (renderedHeight < canvas.height) {
      const currentSliceHeight = Math.min(sliceHeightPx, canvas.height - renderedHeight);
      pageCanvas.height = currentSliceHeight;
      pageContext.fillStyle = '#0F0E0C';
      pageContext.fillRect(0, 0, pageCanvas.width, currentSliceHeight);
      pageContext.drawImage(
        canvas,
        0,
        renderedHeight,
        canvas.width,
        currentSliceHeight,
        0,
        0,
        canvas.width,
        currentSliceHeight
      );

      if (pageIndex > 0) {
        pdf.addPage();
      }

      pdf.setFillColor(15, 14, 12);
      pdf.rect(0, 0, pageWidth, pageHeight, 'F');

      const imageHeightMm = currentSliceHeight * pageWidth / canvas.width;
      pdf.addImage(pageCanvas.toDataURL('image/jpeg', 0.98), 'JPEG', 0, 0, pageWidth, imageHeightMm, undefined, 'FAST');
      renderedHeight += currentSliceHeight;
      pageIndex += 1;
    }

    return pdf;
  } finally {
    document.body.classList.remove('pdf-exporting');
  }
}

async function downloadReport() {
  if (!window.reportData) return;
  const button = document.getElementById('downloadButton');
  const originalText = button.textContent;
  button.disabled = true;
  button.textContent = '正在生成 PDF...';

  try {
    const pdf = await createPdfDocument();
    const nickname = (window.reportData.userInfo && window.reportData.userInfo.nickname) || '用户';
    pdf.save(`天赋潜能报告_${nickname}.pdf`);
  } catch (error) {
    console.error('[Report] download failed:', error);
    alert('PDF 生成失败，请稍后再试。');
  } finally {
    button.disabled = false;
    button.textContent = originalText;
  }
}

document.addEventListener('DOMContentLoaded', renderReportPage);
